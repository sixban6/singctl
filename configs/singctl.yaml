subs:
  - name: "main"                              # 订阅名称 (多订阅时必填)
    url: ""                                   # 你VPN订阅地址
    skip_tls_verify: false                    # 是否跳过TLS验证
    remove-emoji: true
  # 多订阅示例 (可选):
  # - name: "backup"
  #   url: "https://your-backup-subscription"
  #   skip_tls_verify: false
  #   remove-emoji: true

hy2:
  up: 20                                         # Hysteria2 上行带宽 (Mbps)
  down: 200                                      # Hysteria2 下行带宽 (Mbps)

github:
  mirror_url: "https://gh-proxy.com"            # GitHub镜像地址,用于加速

gui:
  mac_url: "https://github.com/SagerNet/sing-box/releases/download/v1.13.0/SFM-1.13.0-Apple.pkg"
  win_url: "https://github.com/SagerNet/sing-box/releases/download/v1.13.0/sing-box-1.13.0-windows-amd64.zip"
  app_name: "SFM"

tailscale:                                      # (可选) Tailscale 部署配置
  auth_key: ""                                  # (可选) Tailscale 授权密钥

server:                                         # (可选) 服务器部署配置
  sb_domain: "sub.yourdomain.com"               # 你的域名
  cf_dns_key: "your_cloudflare_api_token"       # 你的 Cloudflare API Token